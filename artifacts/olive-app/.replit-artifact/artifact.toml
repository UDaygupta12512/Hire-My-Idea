kind = "web"
previewPath = "/"
title = "Olive App"
version = "1.0.0"
id = "artifacts/olive-app"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 22638

[services.development]
run = "pnpm --filter @workspace/olive-app run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/olive-app", "run", "build" ]
publicDir = "artifacts/olive-app/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "22638"
BASE_PATH = "/"
